<!doctype html>
<html lang="vi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Đăng nhập - McDonald's</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-page{min-height:70vh;display:flex;align-items:center;justify-content:center;padding:40px 16px}
    .auth-card{width:100%;max-width:520px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px}
    .auth-card h2{margin:0 0 8px}
    .form-row{margin-bottom:14px}
    .form-row input{width:100%;padding:10px 12px;border:1px solid var(--border);background:transparent;color:var(--text);border-radius:8px}
    .btn-row{display:flex;gap:12px;align-items:center}
    .toast{position:fixed;right:20px;top:20px;background:#3CC468;color:#06210a;padding:10px 14px;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,0.25);display:none}
  </style>
</head>
<body>
  <header>
    <div class="navbar">
      <a href="index.html" class="logo"><img src="images/logo/logo.png" alt="McDonald's" onerror="this.style.display='none'"></a>
      <nav class="nav-links" id="navLinks">
        <a href="index.html">Trang chủ</a>
        <a href="menu.html">Thực đơn</a>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <div style="display:flex;gap:12px;margin-bottom:14px;align-items:center;justify-content:space-between;">
        <a href="index.html" class="btn btn-secondary" style="padding:8px 12px; font-weight:600;">← Trang chủ</a>
        <div style="display:flex;gap:12px;flex:1;margin-left:12px;">
        <button id="tabLogin" class="btn btn-primary" style="flex:1">Đăng nhập</button>
        <button id="tabRegister" class="btn btn-secondary" style="flex:1">Đăng ký</button>
        </div>
      </div>

      <div id="loginPanel">
        <h2>Đăng nhập</h2>
        <p>Đăng nhập để tiếp tục đặt hàng.</p>
        <form id="loginForm">
          <div class="form-row">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="you@example.com" required>
          </div>
          <div class="form-row">
            <label for="password">Mật khẩu</label>
            <input id="password" type="password" placeholder="Mật khẩu" required>
          </div>
          <div class="btn-row">
            <button class="btn btn-primary" type="submit">Đăng nhập</button>
          </div>
        </form>
      </div>

      <div id="registerPanel" style="display:none;margin-top:6px;">
        <h2>Đăng ký</h2>
        <p>Tạo tài khoản để lưu đơn hàng và nhận ưu đãi.</p>
        <form id="inlineRegisterForm">
          <div class="form-row">
            <label for="name">Họ tên</label>
            <input id="name" type="text" placeholder="Nguyễn Văn A" required>
          </div>
          <div class="form-row">
            <label for="regEmail">Email</label>
            <input id="regEmail" type="email" placeholder="you@example.com" required>
          </div>
          <div class="form-row">
            <label for="regPassword">Mật khẩu</label>
            <input id="regPassword" type="password" placeholder="Mật khẩu" required>
          </div>
          <div class="form-row">
            <label for="confirm">Xác nhận mật khẩu</label>
            <input id="confirm" type="password" placeholder="Nhập lại mật khẩu" required>
          </div>
          <div class="btn-row">
            <button class="btn btn-primary" type="submit">Đăng ký</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

<script>
  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.display = 'block';
    setTimeout(()=> t.style.display='none',1600);
  }

  document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password){
      showToast('Vui lòng điền đủ thông tin');
      return;
    }

    // Simple mock auth: check localStorage users
    try{
      const users = JSON.parse(localStorage.getItem('mcdUsers')||'[]');
      const match = users.find(u=>u.email===email && u.password===password);
      if (match){
        localStorage.setItem('mcdUser', JSON.stringify({email: match.email, name: match.name || ''}));
        showToast('Đăng nhập thành công');
        setTimeout(()=> window.location.href='index.html',800);
      } else {
        showToast('Sai email hoặc mật khẩu');
      }
    } catch(err){
      showToast('Lỗi nội bộ');
    }
  });
  // Tab toggle
  const tabLogin = document.getElementById('tabLogin');
  const tabRegister = document.getElementById('tabRegister');
  const loginPanel = document.getElementById('loginPanel');
  const registerPanel = document.getElementById('registerPanel');

  function showRegister(){
    loginPanel.style.display='none';
    registerPanel.style.display='block';
    tabLogin.classList.remove('btn-primary'); tabLogin.classList.add('btn-secondary');
    tabRegister.classList.remove('btn-secondary'); tabRegister.classList.add('btn-primary');
  }
  function showLogin(){
    loginPanel.style.display='block';
    registerPanel.style.display='none';
    tabLogin.classList.remove('btn-secondary'); tabLogin.classList.add('btn-primary');
    tabRegister.classList.remove('btn-primary'); tabRegister.classList.add('btn-secondary');
  }
  tabLogin.addEventListener('click', showLogin);
  tabRegister.addEventListener('click', showRegister);

  // Inline register handler
  document.getElementById('inlineRegisterForm').addEventListener('submit', function(e){
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('confirm').value;
    if(!name || !email || !password){ showToast('Vui lòng điền đủ thông tin'); return; }
    if(password !== confirm){ showToast('Mật khẩu không khớp'); return; }
    if(password.length < 6){ showToast('Mật khẩu ít nhất 6 ký tự'); return; }
    try{
      const users = JSON.parse(localStorage.getItem('mcdUsers')||'[]');
      if(users.find(u=>u.email===email)){
        showToast('Email đã được sử dụng');
        return;
      }
      users.push({name, email, password});
      localStorage.setItem('mcdUsers', JSON.stringify(users));
      showToast('Đăng ký thành công');
      setTimeout(()=> showLogin(),900);
    }catch(err){ showToast('Lỗi lưu trữ'); }
  });
</script>
</body>
</html>
